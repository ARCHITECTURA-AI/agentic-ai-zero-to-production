name: Python Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate .env.example completeness and security
      run: |
        # Ensure no active secrets are committed in .env.example
        if grep -q "sk-[a-zA-Z0-9]\{20,\}" .env.example; then
          echo "Error: Detected potential OpenAI API key in .env.example"
          exit 1
        fi
        # Verify basic structural completeness (all keys have values or placeholders)
        grep -v '^#' .env.example | grep -v '^$' | while read -r line; do
          if [[ ! "$line" =~ ^[A-Za-z0-9_]+=.*$ ]]; then
            echo "Error: Invalid line format in .env.example: $line"
            exit 1
          fi
        done
        echo ".env.example is valid and safe."

    - name: Run pytest
      run: |
        pytest
